trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - '**/*.md'
      - '**/*.py'
      - '**/*.yml'
      - '**/*.yaml'

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.12'

stages:
  - stage: Linting
    displayName: 'Code Quality & Linting'
    jobs:
      - job: LintingJob
        displayName: 'Linting and Code Quality'
        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true
            displayName: 'Set up Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r automation/requirements.txt
            displayName: 'Install dependencies'

          - script: npm install -g markdownlint-cli2
            displayName: 'Install markdownlint-cli2'

          - script: black --check --diff automation/
            displayName: 'Python formatting (Black)'
            continueOnError: true

          - script: ruff check automation/ --output-format=junit --output-file=ruff-results.xml
            displayName: 'Python linting (Ruff)'
            continueOnError: true

          - script: mypy automation/ --junit-xml=mypy-results.xml
            displayName: 'Python type checking (MyPy)'
            continueOnError: false

          - script: yamllint automation/ci/ -f parsable > yamllint-results.txt || true
            displayName: 'YAML linting'
            continueOnError: true

          - script: markdownlint-cli2 "**/*.md" "!node_modules" || true
            displayName: 'Markdown linting'
            continueOnError: true

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '*-results.xml'
              failTaskOnFailedTests: false
              testRunTitle: 'Linting Results'
            displayName: 'Publish linting results'
            condition: always()

  - stage: Testing
    displayName: 'QA Testing & Validation'
    dependsOn: Linting
    condition: always()
    jobs:
      - job: UnitTests
        displayName: 'Unit Tests (utils.py — 100% coverage gate)'
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r automation/requirements.txt
            displayName: 'Install dependencies'

          - script: |
              mkdir -p test-results
              pytest automation/tests/test_utils.py \
                --cov=automation \
                --cov-report=xml \
                --cov-fail-under=100 \
                --junitxml=test-results/unit-results.xml \
                -v
            displayName: 'Run unit tests'
            continueOnError: false

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/unit-results.xml'
              failTaskOnFailedTests: true
              testRunTitle: 'Unit Tests'
            condition: always()

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: 'coverage.xml'
            displayName: 'Publish code coverage'
            condition: always()

      - job: IntegrationTests
        displayName: 'Integration Tests (arXiv API — continue on error)'
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r automation/requirements.txt
            displayName: 'Install dependencies'

          - script: |
              mkdir -p test-results
              pytest automation/tests/ \
                -m "not appium and not selenium and not slow" \
                --ignore=automation/tests/test_utils.py \
                --html=test-results/integration-report.html \
                --self-contained-html \
                --junitxml=test-results/integration-results.xml \
                --reruns 2 --reruns-delay 60 \
                -v
            displayName: 'Run integration tests'
            continueOnError: true

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/integration-results.xml'
              failTaskOnFailedTests: false
              testRunTitle: 'Integration Tests (arXiv API)'
            condition: always()

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'test-results'
              artifactName: 'Integration Test Report'
            displayName: 'Publish HTML report'
            condition: always()

  - stage: AppiumSmoke
    displayName: 'Appium Mobile Smoke Tests (BrowserStack)'
    dependsOn: Testing
    condition: and(succeeded(), eq(variables['BROWSERSTACK_ENABLED'], 'true'))
    jobs:
      - job: AppiumBrowserStack
        displayName: 'Appium Android Smoke Tests — BrowserStack App Automate'
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r automation/requirements.txt
            displayName: 'Install dependencies'

          - script: |
              mkdir -p test-results
              pytest automation/tests/appium/ \
                -m appium \
                --html=test-results/appium-report.html \
                --self-contained-html \
                --junitxml=test-results/appium-results.xml \
                -v
            displayName: 'Run Appium smoke tests on BrowserStack'
            env:
              BROWSERSTACK: 'true'
              BROWSERSTACK_USERNAME: '$(BROWSERSTACK_USERNAME)'
              BROWSERSTACK_ACCESS_KEY: '$(BROWSERSTACK_ACCESS_KEY)'
              BROWSERSTACK_APP_ID: '$(BROWSERSTACK_APP_ID)'
            continueOnError: true

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/appium-results.xml'
              failTaskOnFailedTests: false
              testRunTitle: 'Appium Smoke — BrowserStack'
            condition: always()

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: 'test-results'
              artifactName: 'Appium Smoke Report'
            displayName: 'Publish Appium HTML report'
            condition: always()
