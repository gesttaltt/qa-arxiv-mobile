name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Python formatting check (Black)
        run: black --check --diff automation/

      - name: Python linting (Ruff)
        run: ruff check automation/

      - name: Python type checking (MyPy)
        run: mypy automation/

      - name: YAML linting
        run: yamllint automation/ci/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Markdown linting
        run: |
          npm install -g markdownlint-cli2
          markdownlint-cli2 "**/*.md" "!node_modules"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run API and data validation tests (exclude Appium and Selenium)
        run: |
          pytest automation/tests/ -m "not appium and not selenium" \
            --html=test-results/report.html \
            --cov=automation \
            --cov-report=xml \
            -v

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test-results/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml
