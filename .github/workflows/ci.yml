name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Python formatting check (Black)
        run: black --check --diff automation/

      - name: Python linting (Ruff)
        run: ruff check automation/

      - name: Python type checking (MyPy)
        run: mypy automation/

      - name: YAML linting
        run: yamllint .

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Markdown linting
        run: |
          npm install -g markdownlint-cli2
          markdownlint-cli2 "**/*.md" "!node_modules"

  postman:
    name: Postman / Newman
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: |
          newman run automation/postman/arXiv_API.postman_collection.json \
            --timeout-request 60000 || \
          (echo "First run failed, retrying after 30s..." && sleep 30 && \
            newman run automation/postman/arXiv_API.postman_collection.json \
              --timeout-request 60000)

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run unit tests
        run: |
          pytest automation/tests/test_utils.py \
            --cov=automation \
            --cov-report=xml \
            --cov-fail-under=100 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  test-appium:
    name: Appium Tests (Local Emulator)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Appium server + UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Appium smoke tests on a local Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            appium --log appium.log &
            for i in $(seq 1 30); do
              curl -sf http://127.0.0.1:4723/status > /dev/null && break
              sleep 2
            done
            mkdir -p test-results
            pytest automation/tests/appium/ \
              -m "appium" \
              --html=test-results/appium-report.html \
              --self-contained-html \
              --junitxml=test-results/appium-results.xml \
              --reruns 1 --reruns-delay 5 \
              -s -v
        env:
          ARXIV_APK_PATH: ${{ github.workspace }}/automation/appium/arxiv-papers-v1.0.apk
          APPIUM_SERVER_URL: "http://127.0.0.1:4723"
          ANDROID_DEVICE_NAME: "Android Emulator"

      - name: Collect Appium server log
        if: always()
        run: |
          mkdir -p test-results
          cp appium.log test-results/ 2>/dev/null || true

      - name: Collect hierarchy dumps
        if: always()
        run: |
          mkdir -p test-results/hierarchy
          cp /tmp/page_source_*.xml test-results/hierarchy/ 2>/dev/null || true

      - name: Upload Appium test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: appium-test-report
          path: test-results/

  test-integration:
    name: Integration Tests (arXiv API)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run integration tests
        run: |
          mkdir -p test-results
          pytest automation/tests/ \
            -m "not appium and not slow" \
            --ignore=automation/tests/test_pom_unit.py \
            --ignore=automation/tests/test_utils.py \
            --html=test-results/report.html \
            --self-contained-html \
            --reruns 2 --reruns-delay 60 \
            -v

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-report
          path: test-results/
