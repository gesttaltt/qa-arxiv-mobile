name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Python formatting check (Black)
        run: black --check --diff automation/

      - name: Python linting (Ruff)
        run: ruff check automation/

      - name: Python type checking (MyPy)
        run: mypy automation/

      - name: YAML linting
        run: yamllint .

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Markdown linting
        run: |
          npm install -g markdownlint-cli2
          markdownlint-cli2 "**/*.md" "!node_modules"

  postman:
    name: Postman / Newman
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: |
          newman run automation/postman/arXiv_API.postman_collection.json \
            --timeout-request 60000 || \
          (echo "First run failed, retrying after 30s..." && sleep 30 && \
            newman run automation/postman/arXiv_API.postman_collection.json \
              --timeout-request 60000)

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run unit tests
        run: |
          pytest automation/tests/test_utils.py \
            --cov=automation \
            --cov-report=xml \
            --cov-fail-under=100 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  test-appium:
    name: Appium Tests (BrowserStack)
    runs-on: ubuntu-latest
    needs: lint
    # Best-effort: BrowserStack requires an active trial/plan (ours expired 2026-07-08), and
    # the local-emulator alternative tried on 2026-07-09 hung for 6h in GitHub-hosted CI without
    # ever booting (see docs/QA_AUDIT.md §3.7). continue-on-error is intentional and disclosed —
    # a green run here does NOT confirm the 7 Appium tests actually passed; check the job log.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run Appium smoke tests on BrowserStack
        env:
          BROWSERSTACK: "true"
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_ID: ${{ secrets.BROWSERSTACK_APP_ID }}
        run: |
          mkdir -p test-results
          pytest automation/tests/appium/ \
            -m "appium" \
            --html=test-results/appium-report.html \
            --self-contained-html \
            --junitxml=test-results/appium-results.xml \
            -s -v

      - name: Collect hierarchy dumps
        if: always()
        run: |
          mkdir -p test-results/hierarchy
          cp /tmp/page_source_*.xml test-results/hierarchy/ 2>/dev/null || true

      - name: Upload Appium test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: appium-test-report
          path: test-results/

  test-integration:
    name: Integration Tests (arXiv API)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run integration tests
        run: |
          mkdir -p test-results
          pytest automation/tests/ \
            -m "not appium and not slow" \
            --ignore=automation/tests/test_pom_unit.py \
            --ignore=automation/tests/test_utils.py \
            --html=test-results/report.html \
            --self-contained-html \
            --reruns 2 --reruns-delay 60 \
            -v

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-report
          path: test-results/
