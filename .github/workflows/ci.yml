name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Python formatting check (Black)
        run: black --check --diff automation/

      - name: Python linting (Ruff)
        run: ruff check automation/

      - name: Python type checking (MyPy)
        run: mypy automation/

      - name: YAML linting
        run: yamllint .

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Markdown linting
        run: |
          npm install -g markdownlint-cli2
          markdownlint-cli2 "**/*.md" "!node_modules"

  postman:
    name: Postman / Newman
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        run: newman run automation/postman/arXiv_API.postman_collection.json

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt

      - name: Run API and data validation tests (exclude Appium and Selenium)
        run: |
          mkdir -p test-results
          pytest automation/tests/ -m "not appium and not selenium and not slow" \
            --html=test-results/report.html \
            --self-contained-html \
            --cov=automation \
            --cov-report=xml \
            --cov-fail-under=100 \
            -v

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-report
          path: test-results/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
